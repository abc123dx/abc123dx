        AI INFRASTRUCTURE · AGENT SECURITY · OBSERVABILITY
      </text>
      <text
        x="72"
        y="239"
        fill="#7387a4"
        font-size="14"
        letter-spacing="0.8"
      >
        typed boundaries / explicit trust / visible behavior
      </text>
    </g>

    <rect
      x="20"
      y="20"
      width="1160"
      height="280"
      rx="17"
      fill="none"
      stroke="#a7bad6"
      stroke-opacity="0.11"
    />
  </g>
</svg>
