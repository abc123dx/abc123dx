        abc123dx
      </text>
      <rect x="73" y="158" width="76" height="3" rx="1.5" fill="url(#accent)" />
      <text
        x="72"
        y="198"
        fill="#aabbd3"
        font-size="17"
        font-weight="500"
        letter-spacing="2.4"
