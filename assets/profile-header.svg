<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="320"
  viewBox="0 0 1200 320"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">abc123dx profile header</title>
  <desc id="description">
    A restrained dark technical header representing AI infrastructure, agent
    security, and observability.
  </desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f" />
      <stop offset="0.52" stop-color="#0a1629" />
      <stop offset="1" stop-color="#111a2d" />
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#55d6be" />
      <stop offset="0.52" stop-color="#61a8ff" />
      <stop offset="1" stop-color="#9d87ff" />
    </linearGradient>

    <radialGradient id="halo">
      <stop offset="0" stop-color="#61a8ff" stop-opacity="0.22" />
      <stop offset="1" stop-color="#61a8ff" stop-opacity="0" />
    </radialGradient>

    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path
        d="M 32 0 L 0 0 0 32"
        fill="none"
        stroke="#9db2d2"
        stroke-opacity="0.08"
        stroke-width="1"
      />
    </pattern>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <clipPath id="frame">
      <rect x="0" y="0" width="1200" height="320" rx="24" />
    </clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect width="1200" height="320" fill="url(#background)" />
    <rect width="1200" height="320" fill="url(#grid)" />

    <circle cx="985" cy="155" r="250" fill="url(#halo)" />
    <circle cx="1120" cy="-30" r="180" fill="url(#halo)" opacity="0.55" />

    <path
      d="M-60 270 C240 210 310 355 605 276 S1010 175 1260 245"
      fill="none"
      stroke="url(#accent)"
      stroke-opacity="0.28"
      stroke-width="1.5"
    />
    <path
      d="M530 342 C710 198 915 262 1255 73"
      fill="none"
      stroke="url(#accent)"
      stroke-opacity="0.16"
      stroke-width="1"
    />

    <g transform="translate(850 42)">
      <circle
        cx="148"
        cy="118"
        r="78"
        fill="none"
        stroke="#61a8ff"
        stroke-opacity="0.22"
      />
      <circle
        cx="148"
        cy="118"
        r="42"
        fill="#0b1930"
        stroke="url(#accent)"
        stroke-width="1.5"
      />
      <circle
        cx="148"
        cy="118"
        r="7"
        fill="#55d6be"
        filter="url(#glow)"
      />

      <g fill="none" stroke="#7fa7d9" stroke-opacity="0.52">
        <path d="M148 76 L148 30 L80 20" />
        <path d="M111 98 L63 71 L19 91" />
        <path d="M108 132 L50 154 L18 199" />
        <path d="M137 159 L114 211 L67 229" />
        <path d="M164 159 L195 207 L254 218" />
        <path d="M187 132 L244 150 L286 119" />
        <path d="M185 96 L226 62 L277 73" />
      </g>

      <g fill="#0f203a" stroke="#61a8ff" stroke-width="1.2">
        <circle cx="80" cy="20" r="8" />
        <circle cx="19" cy="91" r="8" />
        <circle cx="18" cy="199" r="8" />
        <circle cx="67" cy="229" r="8" />
        <circle cx="254" cy="218" r="8" />
        <circle cx="286" cy="119" r="8" />
        <circle cx="277" cy="73" r="8" />
      </g>

      <g fill="#55d6be">
        <circle cx="80" cy="20" r="2.5" />
        <circle cx="19" cy="91" r="2.5" />
        <circle cx="18" cy="199" r="2.5" />
        <circle cx="67" cy="229" r="2.5" />
        <circle cx="254" cy="218" r="2.5" />
        <circle cx="286" cy="119" r="2.5" />
        <circle cx="277" cy="73" r="2.5" />
      </g>
    </g>

    <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
      <text
        x="72"
        y="136"
        fill="#f2f7ff"
        font-size="58"
        font-weight="650"
        letter-spacing="-1.5"
