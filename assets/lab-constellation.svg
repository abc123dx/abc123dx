<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="450"
  viewBox="0 0 1200 450"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Modern computing lab constellation</title>
  <desc id="description">
    Five independent open-source laboratories covering agent interoperability,
    edge runtimes, GPU compute, local-first synchronization, and WASI
    components.
  </desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f" />
      <stop offset="0.52" stop-color="#0a1629" />
      <stop offset="1" stop-color="#111a2d" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#55d6be" />
      <stop offset="0.5" stop-color="#61a8ff" />
      <stop offset="1" stop-color="#9d87ff" />
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path
        d="M30 0H0V30"
        fill="none"
        stroke="#9db2d2"
        stroke-opacity="0.06"
      />
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="450" rx="24" fill="url(#background)" />
  <rect width="1200" height="450" rx="24" fill="url(#grid)" />
  <rect
    x="18"
    y="18"
    width="1164"
    height="414"
    rx="17"
    fill="none"
    stroke="#a7bad6"
    stroke-opacity="0.11"
  />

  <g fill="none" stroke="#6d93c6" stroke-opacity="0.35" stroke-width="1.3">
    <path d="M600 225L245 122" />
    <path d="M600 225L955 122" />
    <path d="M600 225L206 342" />
    <path d="M600 225L600 354" />
    <path d="M600 225L994 342" />
  </g>

