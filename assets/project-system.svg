<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="250"
  viewBox="0 0 1200 250"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">AI 工具链工程版图</title>
  <desc id="description">
    三个独立项目方向：用 Model Relay Station 路由模型访问，用 Agent Skill
    Aegis 守护 Agent 配置，用 TraceForge OTel 观察运行轨迹。
  </desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#081221" />
      <stop offset="1" stop-color="#101b31" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#55d6be" />
      <stop offset="0.5" stop-color="#61a8ff" />
      <stop offset="1" stop-color="#9d87ff" />
    </linearGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path
        d="M28 0H0V28"
        fill="none"
        stroke="#91a8ca"
        stroke-opacity="0.06"
      />
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <marker
      id="arrow"
      markerWidth="8"
      markerHeight="8"
      refX="7"
      refY="4"
      orient="auto"
    >
      <path d="M0 0L8 4L0 8Z" fill="#6697d8" fill-opacity="0.72" />
    </marker>
  </defs>

  <rect width="1200" height="250" rx="22" fill="url(#background)" />
  <rect width="1200" height="250" rx="22" fill="url(#grid)" />
  <rect
    x="18"
    y="18"
    width="1164"
    height="214"
    rx="15"
    fill="none"
    stroke="#a6bad8"
    stroke-opacity="0.11"
  />

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif">
    <text
      x="52"
      y="50"
      fill="#7f93af"
      font-size="12"
      font-weight="650"
      letter-spacing="2.2"
    >
      工程版图 / 独立项目
    </text>

    <path
      d="M375 139H430"
      stroke="#6697d8"
      stroke-opacity="0.72"
      marker-end="url(#arrow)"
    />
    <path
      d="M755 139H810"
      stroke="#6697d8"
      stroke-opacity="0.72"
      marker-end="url(#arrow)"
    />

    <g transform="translate(52 76)">
      <rect
        width="323"
        height="126"
        rx="15"
        fill="#0c1a2e"
        stroke="#55d6be"
        stroke-opacity="0.44"
      />
      <circle cx="29" cy="30" r="6" fill="#55d6be" filter="url(#glow)" />
      <text
        x="48"
        y="34"
        fill="#55d6be"
        font-size="11"
        font-weight="700"
        letter-spacing="1.8"
      >
        路由
      </text>
      <text x="24" y="70" fill="#edf5ff" font-size="21" font-weight="650">
        Model Relay Station
      </text>
      <text x="24" y="98" fill="#8fa3bf" font-size="13">
        稳定的多模型访问边界
      </text>
    </g>

    <g transform="translate(432 76)">
      <rect
        width="323"
        height="126"
        rx="15"
        fill="#0c1a2e"
        stroke="#61a8ff"
        stroke-opacity="0.48"
      />
      <circle cx="29" cy="30" r="6" fill="#61a8ff" filter="url(#glow)" />
      <text
        x="48"
        y="34"
        fill="#61a8ff"
        font-size="11"
        font-weight="700"
        letter-spacing="1.8"
      >
        守护
      </text>
      <text x="24" y="70" fill="#edf5ff" font-size="21" font-weight="650">
        Agent Skill Aegis
      </text>
      <text x="24" y="98" fill="#8fa3bf" font-size="13">
        在执行前审查配置
      </text>
    </g>

    <g transform="translate(812 76)">
      <rect
        width="336"
        height="126"
        rx="15"
        fill="#0c1a2e"
        stroke="#9d87ff"
        stroke-opacity="0.48"
      />
      <circle cx="29" cy="30" r="6" fill="#9d87ff" filter="url(#glow)" />
      <text
        x="48"
        y="34"
        fill="#9d87ff"
        font-size="11"
        font-weight="700"
        letter-spacing="1.8"
      >
        观察
      </text>
      <text x="24" y="70" fill="#edf5ff" font-size="21" font-weight="650">
        TraceForge OTel
      </text>
      <text x="24" y="98" fill="#8fa3bf" font-size="13">
        用本地证据解释运行轨迹
      </text>
    </g>

    <rect x="52" y="218" width="1096" height="2" rx="1" fill="url(#accent)" opacity="0.38" />
  </g>
</svg>
